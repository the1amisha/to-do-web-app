<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">

      <header class="sidebar__header">
        <h2 class="sidebar__title">Menu</h2>
        <button class="sidebar__hamburger" type="button" aria-label="Toggle sidebar menu">☰</button>
      </header>

      <form class="sidebar__search">
        <label for="search" class="visually-hidden">Search Tasks</label>
        <input id="search" type="text" placeholder="Search" data-search>
      </form>

      <!-- TASKS Navigation -->
      <section class="sidebar__section">
        <h3 class="sidebar__section-title">TASKS</h3>
        <nav>
          <ul class="sidebar__nav">
            <li class="sidebar__item sidebar__item--active" data-filter="all"><button type="button">All Tasks</button></li>
            <li class="sidebar__item" data-filter="active"><button type="button">Active</button></li>
            <li class="sidebar__item" data-filter="completed"><button type="button">Completed</button></li>
          </ul>
        </nav>
      </section>

      <!-- LISTS Navigation -->
      <section class="sidebar__section">
        <h3 class="sidebar__section-title">LISTS</h3>
        <nav>
          <ul class="sidebar__nav" data-sidebar="lists">
            <!-- rendered by renderLists() -->
          </ul>
        </nav>
      </section>

      <!-- TAGS -->
      <section class="sidebar__section">
        <h3 class="sidebar__section-title">TAGS</h3>
        <ul class="sidebar__nav">
          <li class="sidebar__item">Tag 1</li>
          <li class="sidebar__item">Tag 2</li>
          <li class="sidebar__item">+ Add Tag</li>
        </ul>
      </section>

      <!-- Footer -->
      <footer class="sidebar__footer">
        <nav>
          <ul class="sidebar__nav">
            <li class="sidebar__item"><a href="#">Settings</a></li>
            <li class="sidebar__item"><a href="#">Sign Out</a></li>
          </ul>
        </nav>
      </footer>

    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="content">

      <!-- Filter Summary (rendered by renderFilterSummary()) -->
      <section class="filter-summary" data-filter-summary hidden></section>

      <!-- Today Section -->
      <section class="content__group" data-group="today">
        <header class="content__group-header">
          <h1 class="content__group-title">Today</h1>
          <button class="content__add-btn">+ Add New Task</button>
        </header>
        <ul class="content__task-list"></ul>
      </section>

      <!-- Tomorrow Section -->
      <section class="content__group" data-group="tomorrow">
        <header class="content__group-header">
          <h2 class="content__group-title">Tomorrow</h2>
          <button class="content__add-btn">+ Add New Task</button>
        </header>
        <ul class="content__task-list"></ul>
      </section>

      <!-- This Week Section -->
      <section class="content__group" data-group="thisWeek">
        <header class="content__group-header">
          <h2 class="content__group-title">This Week</h2>
          <button class="content__add-btn">+ Add New Task</button>
        </header>
        <ul class="content__task-list"></ul>
      </section>

    </main>

    <aside class="detail-panel" hidden>
      <!-- rendered by renderDetailPanel() -->
    </aside>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
