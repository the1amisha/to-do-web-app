<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dashboard">

    <!-- ===== SIDEBAR =====
         Click delegation attached via document.querySelector('[data-sidebar]')
         Handles: [data-filter] clicks, [data-list] clicks, "+ Add New List" item -->
    <aside class="sidebar" data-sidebar>

      <header class="sidebar__header">
        <h2 class="sidebar__title">Menu</h2>
        <button class="sidebar__hamburger" type="button" aria-label="Toggle sidebar menu">☰</button>
      </header>

      <!-- Search: queried via document.querySelector('[data-search]') -->
      <form class="sidebar__search">
        <label for="search" class="visually-hidden">Search Tasks</label>
        <input id="search" type="text" placeholder="Search" data-search>
      </form>

      <!-- Status filters: [data-filter] items matched by handleSidebarClick -->
      <section class="sidebar__section">
        <h3 class="sidebar__section-title">TASKS</h3>
        <nav>
          <ul class="sidebar__nav">
            <li class="sidebar__item sidebar__item--active" data-filter="all">
              <button type="button">All Tasks</button>
            </li>
            <li class="sidebar__item" data-filter="active">
              <button type="button">Active</button>
            </li>
            <li class="sidebar__item" data-filter="completed">
              <button type="button">Completed</button>
            </li>
          </ul>
        </nav>
      </section>

      <!-- Lists: populated dynamically by renderLists() into [data-sidebar="lists"] -->
      <section class="sidebar__section">
        <h3 class="sidebar__section-title">LISTS</h3>
        <nav>
          <ul class="sidebar__nav" data-sidebar="lists"></ul>
        </nav>
      </section>

      <!-- Footer -->
      <footer class="sidebar__footer">
        <nav>
          <ul class="sidebar__nav">
            <li class="sidebar__item"><a href="#">Settings</a></li>
            <li class="sidebar__item"><a href="#">Sign Out</a></li>
          </ul>
        </nav>
      </footer>

    </aside>

    <!-- ===== MAIN CONTENT =====
         .content class used as container for undo-toast append -->
    <main class="content">

      <!-- Filter summary: rendered by renderFilterSummary() into [data-filter-summary] -->
      <section class="filter-summary" data-filter-summary hidden></section>

      <!-- Task list container: event delegation via document.querySelector('.content__task-lists') -->
      <div class="content__task-lists">

        <!-- Today -->
        <section class="content__group" data-group="today">
          <header class="content__group-header">
            <h1 class="content__group-title">Today</h1>
            <button class="content__group-add" type="button">+ Add New Task</button>
          </header>
          <ul class="content__task-list"></ul>
        </section>

        <!-- Tomorrow -->
        <section class="content__group" data-group="tomorrow">
          <header class="content__group-header">
            <h2 class="content__group-title">Tomorrow</h2>
            <button class="content__group-add" type="button">+ Add New Task</button>
          </header>
          <ul class="content__task-list"></ul>
        </section>

        <!-- This Week -->
        <section class="content__group" data-group="thisWeek">
          <header class="content__group-header">
            <h2 class="content__group-title">This Week</h2>
            <button class="content__group-add" type="button">+ Add New Task</button>
          </header>
          <ul class="content__task-list"></ul>
        </section>

      </div>
    </main>

    <!-- Detail panel: rendered by renderDetailPanel() into .detail-panel -->
    <aside class="detail-panel" hidden></aside>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
